<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baroda High School - Math Practice</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col relative">

    <div class="math-bg-symbols fixed inset-0 pointer-events-none z-0">
        <div class="symbol s1">+</div>
        <div class="symbol s2">−</div>
        <div class="symbol s3">×</div>
        <div class="symbol s4">÷</div>
        <div class="symbol s5">=</div>
        <div class="symbol s6">%</div>
        <div class="symbol s7">π</div>
        <div class="symbol s8">√</div>
        <div class="symbol s9">∞</div>
        <div class="symbol s10">∑</div>
        <div class="symbol s11">≠</div>
        <div class="symbol s12">≈</div>
    </div>

    <header class="bg-[#1a365d] p-6 shadow-md z-30 sticky top-0 w-full">
        <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-6">
            
            <div class="flex items-center gap-6">
                <img src="Logo.jpg" alt="Baroda High School Logo" class="h-20 w-auto drop-shadow-md rounded-xl bg-white p-1">
                <div class="space-y-1">
                    <h1 class="text-4xl font-extrabold text-white tracking-tight leading-tight">Baroda High Schools</h1>
                    <h2 class="text-lg font-semibold text-slate-300"><I>An Interactive Math Practice Portal</I></h2>
                </div>
            </div>

            <div class="bg-white py-3 px-6 rounded-xl shadow-lg border-t-4 border-blue-600 flex items-center gap-3">
                <h2 class="text-2xl font-bold text-[#1a365d]">Practice Room</h2>
                <div class="text-3xl">🎯</div>
            </div>

        </div>
    </header>

    <main class="flex-1 w-full max-w-7xl mx-auto z-10 p-6 md:p-10 flex flex-col items-center relative">
        
        <div id="app-container" class="max-w-4xl w-full bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl p-10 min-h-[500px] border border-slate-100">
            
            <div class="flex flex-wrap items-center justify-between w-full mb-6 pb-4 border-b-2 border-slate-100">
                <div class="flex gap-4">
                    <button id="nav-back-grades" onclick="showGrades()" class="hidden text-blue-600 hover:text-blue-800 font-bold text-lg transition-transform hover:-translate-x-1">
                        &larr; Back to Grades
                    </button>
                    
                    <button id="nav-back-topics" onclick="showTopics(currentGrade)" class="hidden text-blue-600 hover:text-blue-800 font-bold text-lg transition-transform hover:-translate-x-1">
                        &larr; Back to Topics
                    </button>
                </div>

                <a href="index.html" class="text-slate-500 hover:text-blue-600 font-bold text-lg transition-colors bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-lg">
                    🏠 Home Page
                </a>
            </div>

            <div id="loading-screen" class="text-center py-10">
                <p class="text-2xl text-slate-600 animate-pulse font-bold">Loading database...</p>
            </div>

            <div id="grade-view" class="hidden text-center">
                <h2 class="text-4xl font-bold mb-8 text-slate-800">Select Your Grade</h2>
                <div id="grade-buttons" class="grid grid-cols-2 gap-6"></div>
            </div>

            <div id="topic-view" class="hidden text-center">
                <h2 class="text-4xl font-bold mb-8 text-slate-800" id="selected-grade-title">Select a Topic</h2>
                <div id="topic-buttons" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>

            <div id="type-view" class="hidden text-center py-4">
                <h2 id="selected-topic-title" class="text-4xl font-bold mb-4 text-[#0e5096]"></h2>
                <p class="text-2xl text-slate-600 mb-8 font-medium">Choose your practice mode:</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <button onclick="startPracticeFilter('ALL')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-6 px-6 rounded-2xl shadow-md transition-transform hover:-translate-y-1 text-2xl">
                        🎲 Mixed (All Types)
                    </button>
                    <button onclick="startPracticeFilter('MCQ')" class="bg-white border-4 border-slate-300 text-slate-800 hover:border-blue-500 hover:bg-blue-50 font-bold py-6 px-6 rounded-2xl shadow-sm transition-transform hover:-translate-y-1 text-2xl">
                        🔘 Multiple Choice
                    </button>
                    <button onclick="startPracticeFilter('FIB')" class="bg-white border-4 border-slate-300 text-slate-800 hover:border-blue-500 hover:bg-blue-50 font-bold py-6 px-6 rounded-2xl shadow-sm transition-transform hover:-translate-y-1 text-2xl">
                        ✍️ Fill in the Blanks
                    </button>
                    <button onclick="startPracticeFilter('TF')" class="bg-white border-4 border-slate-300 text-slate-800 hover:border-blue-500 hover:bg-blue-50 font-bold py-6 px-6 rounded-2xl shadow-sm transition-transform hover:-translate-y-1 text-2xl">
                        ✅ True / False
                    </button>
                </div>
            </div>

            <div id="practice-view" class="hidden">
                <div class="flex flex-wrap justify-between items-center mb-8 text-xl font-bold text-slate-600 bg-slate-100 p-4 rounded-xl gap-4">
                    <button onclick="quitPractice()" class="text-red-600 hover:text-red-800 bg-red-100 hover:bg-red-200 px-4 py-2 rounded-lg border border-red-300 shadow-sm transition-colors">
                        ❌ Quit
                    </button>
                    <span id="progress-text" class="text-slate-700">Question 1 of X</span>
                    <span id="timer-display" class="text-blue-700 font-mono bg-blue-100 px-4 py-2 rounded-lg border border-blue-300 shadow-inner">⏱️ 00:00</span>
                    <span id="current-score" class="text-green-700 bg-green-100 px-4 py-2 rounded-lg border border-green-300">Score: 0</span>
                </div>
                
                <h3 id="question-text" class="text-3xl md:text-4xl font-extrabold mb-6 text-slate-900 leading-snug text-center"></h3>
                
                <img id="question-image" src="" alt="Math Question Image" class="hidden mx-auto mb-10 max-h-64 rounded-xl shadow-md border-2 border-slate-200 object-contain">
                
                <div id="options-container" class="flex flex-col gap-4 mb-8">
                </div>

                <div id="feedback-container" class="hidden p-6 rounded-xl mb-8 text-center text-2xl shadow-inner">
                    <p id="feedback-message" class="font-bold"></p>
                    <p id="explanation-text" class="mt-3 font-medium opacity-90"></p>
                </div>

                <div class="text-center mt-8">
                    <button id="next-btn" onclick="nextQuestion()" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-extrabold text-2xl py-4 px-10 rounded-xl w-full shadow-lg transition-transform hover:scale-105">
                        Next Question &rarr;
                    </button>
                </div>
            </div>

            <div id="score-view" class="hidden text-center py-10">
                <h2 class="text-5xl font-extrabold mb-6 text-slate-800">Practice Complete!</h2>
                <p class="text-3xl mb-4 font-medium text-slate-700">You scored <span id="final-score" class="text-blue-600 font-black
